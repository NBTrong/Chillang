<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dictation Mode - Focus</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script>tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#1A1A1A", "background-light": "#f7f7f7", "background-dark": "#191919", "dark-gray-canvas": "#2A2A2A"}, fontFamily: {display: "Inter"}, borderRadius: {DEFAULT: "0.5rem", lg: "1rem", xl: "1.5rem", full: "9999px"}}}};</script>
<style>
        .material-symbols-outlined {
            font-variation-settings:
                'FILL' 0,
                'wght' 400,
                'GRAD' 0,
                'opsz' 24
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark">
<div class="relative flex h-screen min-h-screen w-full flex-col group/design-root overflow-hidden">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-white/10 px-6 sm:px-10 py-3">
<div class="flex items-center gap-4 text-white">
<div class="text-primary size-6">
<svg fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="m21.2 11.2-8.8-8.8c.65.65.3 2 .3 3.8 0 1.1-.35 2.3-1.05 3.45-.7 1.15-1.65 2.2-2.8 3.35-1.15 1.15-2.2 2.1-3.35 2.8-1.15.7-2.35 1.05-3.45 1.05-1.8 0-3.15-.3-3.8-.3l8.8 8.8c.6.6 1.7.35 3.3.35 1.1 0 2.25-.35 3.4-1.05s2.2-1.7 3.3-2.85 2.1-2.25 2.85-3.4c.7-1.15 1.05-2.3 1.05-3.4.6-1.6.35-2.7-.25-3.35Z"></path>
</svg>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-tight">Dictation: Lesson 1 - Part 3</h2>
</div>
<button class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 w-10 bg-white/5 text-white hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</header>
<main class="flex flex-1 justify-center py-5 px-4 sm:px-6 md:px-8">
<div class="layout-content-container flex flex-col w-full max-w-[960px] flex-1">
<div class="flex flex-col gap-2 py-2 px-4">
<div class="flex justify-between items-center">
<p class="text-white text-sm font-medium leading-normal opacity-70">Câu 5/20</p>
</div>
<div class="rounded-full bg-white/10 h-1">
<div class="h-1 rounded-full bg-[#84cc16]" style="width: 25%;"></div>
</div>
</div>
<div class="flex-grow flex flex-col justify-center items-center py-8">
<div class="w-full max-w-3xl px-4 flex flex-col items-center">
<div class="w-full mb-4">
<p class="text-slate-300 text-base font-normal leading-normal pb-3 pt-1">
                                    Your answer: The quick brown fox <span class="text-red-500 bg-red-500/10 px-1 rounded-md line-through">jumpss</span> over the lazy dog.
                                </p>
<p class="text-slate-300 text-base font-normal leading-normal pb-3 pt-1">
                                    Correct answer: The quick brown fox <span class="text-[#34d399] bg-green-500/10 px-1 rounded-md">jumps</span> over the lazy dog.
                                </p>
</div>
<div class="relative w-full">
<label class="flex flex-col w-full">
<p class="text-white text-base font-medium leading-normal pb-2 self-start sr-only">Your Answer</p>
<textarea class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-none focus:ring-0 focus:border-transparent border border-white/10 bg-dark-gray-canvas min-h-[300px] placeholder:text-slate-400 p-[20px] text-lg font-normal leading-relaxed" placeholder="Type what you hear..."></textarea>
</label>
<div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex items-center gap-2 mt-4">
<button class="flex items-center justify-center rounded-full size-10 bg-white/5 text-white/50 hover:bg-white/10 hover:text-white transition-colors focus:ring-0 focus:outline-none">
<span class="material-symbols-outlined text-xl">replay</span>
</button>
<button class="flex items-center justify-center rounded-full size-10 bg-white/5 text-white/50 hover:bg-white/10 hover:text-white transition-colors focus:ring-0 focus:outline-none">
<span class="material-symbols-outlined text-xl">lightbulb</span>
</button>
<button class="flex items-center justify-center rounded-full size-10 bg-white/5 text-white/50 hover:bg-white/10 hover:text-white transition-colors focus:ring-0 focus:outline-none">
<span class="material-symbols-outlined text-xl">skip_next</span>
</button>
</div>
</div>
</div>
</div>
<footer class="p-4 border-t border-white/10 mt-auto">
<div class="flex justify-end max-w-[960px] mx-auto">
<button class="flex items-center justify-center rounded-lg h-12 px-8 bg-primary text-white text-base font-bold hover:bg-blue-500 transition-colors">Check Answer</button>
</div>
</footer>
</div>
</main>
</div>
</div>
</body></html>
