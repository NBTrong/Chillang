<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LearnTube AI - Học ngoại ngữ qua YouTube</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script>tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#1A1A1A", "background-light": "#f7f7f7", "background-dark": "#191919"}, fontFamily: {display: "Inter"}, borderRadius: {DEFAULT: "0.5rem", lg: "1rem", xl: "1.5rem", full: "9999px"}}}};</script>
<style>
      .material-symbols-outlined {
        font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24
      }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#E0E0E0]">
<div class="relative flex min-h-screen w-full flex-col">
<div class="flex h-full grow flex-col">
<div class="flex flex-1 justify-center px-4 sm:px-8 md:px-16 lg:px-40 py-5">
<div class="flex w-full max-w-[960px] flex-1 flex-col">
<header class="flex h-16 items-center justify-between px-2 sm:px-4">
<div class="flex items-center gap-2">
<button class="flex h-10 w-10 cursor-pointer items-center justify-center rounded-lg text-white/80 transition-colors hover:bg-white/10 hover:text-white">
<span class="material-symbols-outlined" style="font-size: 24px;">menu</span>
</button>
</div>
<div class="flex items-center gap-2">
<div class="size-6 text-primary">
<svg fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19.615 3.185A.981.981 0 0 0 18.58 3H5.42A.981.981 0 0 0 4.385 4.398l7.03 16.924a.49.49 0 0 0 .91 0l7.29-16.74a.981.981 0 0 0 0-1.397zM6.162 5h11.676L12 18.39 6.162 5z"></path>
</svg>
</div>
<h2 class="text-white text-base font-bold leading-tight tracking-[-0.015em]">LearnTube AI</h2>
</div>
<div class="flex flex-1 items-center justify-end gap-2">
<button class="flex h-10 w-10 cursor-pointer items-center justify-center overflow-hidden rounded-full transition-all hover:ring-2 hover:ring-white/20">
<div class="h-8 w-8 rounded-full bg-cover bg-center bg-no-repeat" data-alt="User avatar image" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCNFPuTOlh6Jv96308bbl7u2Okuwk7w_kkRXs45KsyJfNSrghEngjwGYLszHK4a0PulwTmF_PdztViKEvAPK-B_YfB1knQy3mTE-Tc4SEWF0XNRwKVczzCJ9Jlg_LXnRa7HTmO3tJo849LAEq1YLrSZPqrXT_hwUBKmShgwFyZmaM-HmJ-c2e2nYs7fiu31YdBQnsqHEr_1e-wJYWEouNAFrCzTnTc9KueVpDWqcl557okg0d0SmBC7MrLsYZ3OTSolyIAT-H30qko");'></div>
</button>
</div>
</header>
<main class="flex flex-1 flex-col items-center justify-center pt-10 sm:pt-16 pb-20">
<div class="flex w-full max-w-2xl flex-col items-center gap-6">
<h1 class="px-4 text-center text-3xl font-bold leading-tight tracking-tight text-white sm:text-4xl">Chào mừng trở lại! Bạn muốn học gì hôm nay?</h1>
<div class="flex w-full flex-col items-center gap-4 px-4">
<div class="group relative w-full">
<input class="form-input h-14 w-full resize-none overflow-hidden rounded-xl border border-white/20 bg-white/5 p-4 pr-24 text-base font-normal leading-normal text-white placeholder:text-white/40 focus:border-primary focus:outline-0 focus:ring-2 focus:ring-primary/50" placeholder="Dán link YouTube video vào đây..." value=""/>
<div class="absolute inset-y-0 right-0 flex items-center pr-3">
<button class="flex h-9 w-9 cursor-pointer items-center justify-center rounded-lg text-white/60 transition-colors hover:bg-white/10 hover:text-white">
<span class="material-symbols-outlined">content_paste</span>
</button>
<button class="flex h-9 w-9 cursor-pointer items-center justify-center rounded-lg bg-primary text-white transition-colors hover:bg-primary/90 disabled:cursor-not-allowed disabled:bg-white/10 disabled:text-white/40" disabled="">
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
<div class="mt-4 hidden w-full items-center justify-center gap-3 rounded-lg bg-white/5 px-4 py-3 text-sm text-white/70">
<div class="h-5 w-5 animate-spin rounded-full border-2 border-solid border-primary border-t-transparent"></div>
<span>Đang xử lý bằng AI...</span>
</div>
</div>
</div>
<div class="mt-16 w-full max-w-2xl px-4">
<h3 class="mb-4 text-sm font-bold text-white/50">VIDEO GỢI Ý</h3>
<div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
<a class="group flex items-center gap-3 rounded-lg p-2.5 transition-colors hover:bg-white/5" href="#">
<div class="h-10 w-10 flex-shrink-0 items-center justify-center overflow-hidden rounded bg-white/10">
<span class="material-symbols-outlined text-white/60">play_arrow</span>
</div>
<span class="truncate text-sm text-white/80 group-hover:text-white">Học 100 cụm từ tiếng Anh thông dụng</span>
</a>
<a class="group flex items-center gap-3 rounded-lg p-2.5 transition-colors hover:bg-white/5" href="#">
<div class="h-10 w-10 flex-shrink-0 items-center justify-center overflow-hidden rounded bg-white/10">
<span class="material-symbols-outlined text-white/60">play_arrow</span>
</div>
<span class="truncate text-sm text-white/80 group-hover:text-white">Luyện nghe tiếng Pháp qua bản tin</span>
</a>
</div>
</div>
</main>
</div>
</div>
</div>
</div>
</body></html>
